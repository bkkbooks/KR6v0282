body:
  text: 維大齊河清三年歲次甲申四月己丑朔十三日庚子敬造若夫至理玄寂非言無以詮其景行道宗沖邃匪功何以表其盛德至迺擾擾四生皆出入於存亡之境驅驅萬有僉去來於是非之路幻術雖形駛電已滅輪迴不息循環豈已非建弘業意奉靈津昏惑之鄣誰減明達之旨焉致然有北豫州州都白水王府行參軍兼別駕毛叉擢本八桂之藂抽芳鄧林之菀播才俊於望府藉地厚於嚮家識惠清遠人為水鏡器量遐濟才實通理苦空無我便損七尺之軀緣假非有不吝千金之貨仍有比丘僧道政德行淹潤負素攸顯洗心法水構情道際共相經紀出入存功遂率邑義卌人等選自福田瞻言勝地在垣寺所敬造石像一區石採嵩華匠追揚鄴麗絕圖繢妙盡真容北佩鄭邑是桓武之舊事南面形瞰由產之盛業左帶二水乃延智者之居右瞻三山仍屬仁者之宅千藂百菓異色同榮葉蔽陰連少知星月流遁之容得道入門負笈之夫陟遊忘返宗門俊德器令是飾荷錫名僧豈遠千里戒行清苦必存十善之識言念至誠詎違六時之道馴馴恂恂邕邕穆穆真有鹿菀之風不無象山之誨敬羨嘉處建茲功德其詞曰無小無大薨想伊歸誰窮誰達溘盡為非喆人明識惠此津機濟時以道拯手垂衣苦海揚波火宅炎盛多淦汲引昇此究竟逐迷得杆假我明命膺感不休功興已竟道生四諦空起三門白鵝致善烏鴨與恩靈迹弘烈敢庶斯存鐫石功紀固本深相理尚沖寂道真清素絕塵自此和光匪處崔嵬高山浮丘已過潺湲流水濯嬰是趨
